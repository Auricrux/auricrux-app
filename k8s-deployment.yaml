# Kubernetes Deployment for Auricrux Web Application
# Generated: 2026-07-08
# Version: 1.0.0

---
apiVersion: v1
kind: Namespace
metadata:
  name: auricrux-prod
  labels:
    environment: production
    managed-by: terraform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auricrux-config
  namespace: auricrux-prod
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:80"
  DOTNET_RUNNING_IN_CONTAINER: "true"
  LOG_LEVEL: "Information"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auricrux-web
  namespace: auricrux-prod
  labels:
    app: auricrux-web
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auricrux-web
  template:
    metadata:
      labels:
        app: auricrux-web
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: auricrux-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: auricrux-web
        image: auricrux/web:1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        - name: https
          containerPort: 443
          protocol: TCP
        
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: auricrux-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: auricrux-config
              key: ASPNETCORE_URLS
        - name: DOTNET_RUNNING_IN_CONTAINER
          valueFrom:
            configMapKeyRef:
              name: auricrux-config
              key: DOTNET_RUNNING_IN_CONTAINER
        
        livenessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: var-run
          mountPath: /var/run
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: var-run
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - auricrux-web
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: auricrux-web-service
  namespace: auricrux-prod
  labels:
    app: auricrux-web
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
  selector:
    app: auricrux-web
  sessionAffinity: ClientIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auricrux-web
  namespace: auricrux-prod
  labels:
    app: auricrux-web

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auricrux-web-role
  namespace: auricrux-prod
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auricrux-web-rolebinding
  namespace: auricrux-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: auricrux-web-role
subjects:
- kind: ServiceAccount
  name: auricrux-web
  namespace: auricrux-prod

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auricrux-web-hpa
  namespace: auricrux-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auricrux-web
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auricrux-web-pdb
  namespace: auricrux-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: auricrux-web

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auricrux-web-network-policy
  namespace: auricrux-prod
spec:
  podSelector:
    matchLabels:
      app: auricrux-web
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
