# Kubernetes Ingress Configuration for Auricrux Web Application
# Supports both NGINX and cloud provider ingresses
# Generated: 2026-07-08

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auricrux-web-ingress
  namespace: auricrux-prod
  labels:
    app: auricrux-web
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-rate-limit: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - auricrux.app
    - www.auricrux.app
    - api.auricrux.app
    secretName: auricrux-tls-cert
  rules:
  - host: auricrux.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auricrux-web-service
            port:
              number: 80
  - host: www.auricrux.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auricrux-web-service
            port:
              number: 80
  - host: api.auricrux.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: auricrux-web-service
            port:
              number: 80

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: michael@futurecontractorsofamerica.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: v1
kind: Service
metadata:
  name: auricrux-web-nodeport
  namespace: auricrux-prod
  labels:
    app: auricrux-web
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
    nodePort: 30080
  - name: https
    port: 443
    targetPort: https
    protocol: TCP
    nodePort: 30443
  selector:
    app: auricrux-web
